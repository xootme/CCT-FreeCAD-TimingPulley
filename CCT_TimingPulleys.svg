<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Pulley teeth ring -->
  <circle cx="32" cy="32" r="31" fill="#761516"/>
  <!-- Belt groove -->
  <circle cx="32" cy="32" r="25" fill="#5a1011"/>
  <!-- Spoke area / rim -->
  <circle cx="32" cy="32" r="21" fill="#761516"/>
  <!-- Bore hole -->
  <circle cx="32" cy="32" r="7" fill="#ffffff"/>
  <!-- Tooth notches (12 evenly spaced cutouts on outer ring) -->
  <g fill="#5a1011">
    <rect x="30" y="1"  width="4" height="6" rx="1" transform="rotate(0   32 32)"/>
    <rect x="30" y="1"  width="4" height="6" rx="1" transform="rotate(30  32 32)"/>
    <rect x="30" y="1"  width="4" height="6" rx="1" transform="rotate(60  32 32)"/>
    <rect x="30" y="1"  width="4" height="6" rx="1" transform="rotate(90  32 32)"/>
    <rect x="30" y="1"  width="4" height="6" rx="1" transform="rotate(120 32 32)"/>
    <rect x="30" y="1"  width="4" height="6" rx="1" transform="rotate(150 32 32)"/>
    <rect x="30" y="1"  width="4" height="6" rx="1" transform="rotate(180 32 32)"/>
    <rect x="30" y="1"  width="4" height="6" rx="1" transform="rotate(210 32 32)"/>
    <rect x="30" y="1"  width="4" height="6" rx="1" transform="rotate(240 32 32)"/>
    <rect x="30" y="1"  width="4" height="6" rx="1" transform="rotate(270 32 32)"/>
    <rect x="30" y="1"  width="4" height="6" rx="1" transform="rotate(300 32 32)"/>
    <rect x="30" y="1"  width="4" height="6" rx="1" transform="rotate(330 32 32)"/>
  </g>
</svg>
